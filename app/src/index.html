<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoFreeXit</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="toolbar">
      <strong class="brand">FoFreeXit</strong>
      <span class="phase">Phase 1 · Viewer</span>
      <button id="openBtn" title="Mở file PDF">📂 Mở</button>
      <span class="sep"></span>
      <button id="pagePrev" title="Trang trước (Page Up)">▲</button>
      <input id="pageInput" class="pagenum" type="text" inputmode="numeric" title="Đến trang…" />
      <span class="pageof">/ <span id="pageTotal">—</span></span>
      <button id="pageNext" title="Trang sau (Page Down)">▼</button>
      <span class="sep"></span>
      <button id="zoomOut" title="Thu nhỏ (Ctrl+-)">−</button>
      <select id="zoomSelect" class="zoom" title="Mức zoom"></select>
      <button id="zoomIn" title="Phóng to (Ctrl++)">+</button>
      <button id="zoomFit" title="Vừa bề rộng">Vừa rộng</button>
      <button id="zoomFitPage" title="Vừa trang">Vừa trang</button>
      <span class="sep"></span>
      <input id="searchBox" type="search" placeholder="Tìm trong tài liệu… (Ctrl+F)" autofocus />
      <label class="searchopt" title="Phân biệt hoa/thường"><input id="searchCase" type="checkbox" />Aa</label>
      <button id="searchPrev" title="Kết quả trước (Shift+Enter)">◀</button>
      <span id="searchCount" class="searchcount">—</span>
      <button id="searchNext" title="Kết quả sau (Enter)">▶</button>
      <span class="sep"></span>
      <button id="copyPage" title="Copy text trang hiện tại">⧉ Copy</button>
      <span class="sep"></span>
      <button id="undoBtn" title="Hoàn tác (Ctrl+Z)" disabled>↶ Hoàn tác</button>
      <button id="redoBtn" title="Làm lại (Ctrl+Y)" disabled>↷ Làm lại</button>
      <span class="sep"></span>
      <button id="organizeModeBtn" title="Tổ chức trang">🗂 Tổ chức trang</button>
      <button id="editModeBtn" title="Sửa nội dung trang">✏️ Sửa nội dung</button>
      <button id="secModeBtn" title="Bảo mật: redact, mật khẩu, metadata">🔒 Bảo mật</button>
      <div class="spacer"></div>
      <span id="status" class="status"></span>
    </header>

    <div id="annobar" class="annobar">
      <span class="annolabel">Chú thích:</span>
      <button class="atool" data-tool="highlight" title="Tô sáng (kéo vùng)">🖍️ Tô sáng</button>
      <button class="atool" data-tool="underline" title="Gạch chân">U̲ Gạch chân</button>
      <button class="atool" data-tool="strikeout" title="Gạch ngang">S̶ Gạch ngang</button>
      <button class="atool" data-tool="square" title="Khung chữ nhật">▭ Khung</button>
      <button class="atool" data-tool="freetext" title="Hộp văn bản">🅣 Text box</button>
      <button class="atool" data-tool="note" title="Ghi chú dán">📌 Ghi chú</button>
      <button class="atool" data-tool="crop" title="Crop trang">✂️ Crop</button>
      <span class="sep"></span>
      <button id="annotColorBtn" class="atool" title="Màu chú thích"><span class="sw" id="annotSw"></span> Màu</button>
      <span class="spacer"></span>
      <span id="annotHint" class="status"></span>
      <button id="saveAnnots" disabled>💾 Lưu chú thích (<span id="annotCount">0</span>)</button>
    </div>

    <div id="organizeBar" class="organizebar hidden">
      <span class="annolabel">Tổ chức trang:</span>
      <button id="orgInsert" title="Chèn trang">➕ Chèn</button>
      <button id="orgDelete" title="Xoá trang đã chọn (Delete)">🗑 Xoá</button>
      <button id="orgRotateL" title="Xoay trái">↺ Xoay trái</button>
      <button id="orgRotateR" title="Xoay phải">↻ Xoay phải</button>
      <button id="orgExtract" title="Trích trang đã chọn">📤 Trích</button>
      <button id="orgReplace" title="Thay trang đã chọn">🔁 Thay</button>
      <span class="sep"></span>
      <button id="orgMerge" title="Trộn nhiều file PDF">🔀 Trộn file</button>
      <button id="orgSplit" title="Tách thành nhiều file">✂ Tách file</button>
      <button id="orgWatermark" title="Thêm watermark">💧 Watermark</button>
      <button id="orgHeaderFooter" title="Thêm header/footer">📋 Header/Footer</button>
      <span class="spacer"></span>
      <span id="organizeHint" class="status"></span>
      <button id="orgSave" disabled>💾 Lưu thay đổi tổ chức trang</button>
    </div>

    <div id="editBar" class="editbar hidden">
      <span class="annolabel">Sửa nội dung:</span>
      <button id="edAddText" title="Thêm chữ — bấm rồi click lên trang">🆎 Thêm chữ</button>
      <button id="edAddImage" title="Thêm ảnh — chọn ảnh rồi click lên trang">🖼 Thêm ảnh</button>
      <button id="edDelete" title="Xoá đối tượng đang chọn (Delete)" disabled>🗑 Xoá</button>
      <button id="edReplaceImage" title="Thay ảnh đang chọn" disabled>🔁 Thay ảnh</button>
      <span class="sep"></span>
      <label class="ed-prop">Font <select id="edFontFamily" disabled>
        <option value="">(giữ nguyên)</option>
        <option>Arial</option>
        <option>Times New Roman</option>
        <option>Calibri</option>
        <option>Cambria</option>
        <option>Georgia</option>
        <option>Verdana</option>
        <option>Tahoma</option>
        <option>Segoe UI</option>
        <option>Courier New</option>
      </select></label>
      <label class="ed-prop">Cỡ chữ <input id="edFontSize" type="number" min="1" max="400" disabled></label>
      <button id="edBold" class="ed-style" title="Đậm (giữ họ font, đổi biến thể)" disabled><b>B</b></button>
      <button id="edItalic" class="ed-style" title="Nghiêng (giữ họ font, đổi biến thể)" disabled><i>I</i></button>
      <button id="edColorBtn" class="atool" title="Màu chữ" disabled><span class="sw" id="edSw"></span> Màu</button>
      <span class="spacer"></span>
      <span id="editHint" class="status"></span>
      <button id="edSave" disabled>💾 Lưu thay đổi nội dung</button>
    </div>

    <div id="secBar" class="editbar hidden">
      <span class="annolabel">Bảo mật:</span>
      <button id="secRedactTool" class="atool" data-tool="redact" title="Kéo chuột trên trang để đánh dấu vùng cần bôi đen — nội dung bị XOÁ THẬT khi áp dụng">⬛ Đánh dấu redact</button>
      <button id="secRedactApply" disabled title="Xoá thật nội dung trong các vùng đã đánh dấu, lưu ra file mới">Áp dụng redact (<span id="redactCount">0</span>)</button>
      <button id="secRedactClear" disabled title="Bỏ toàn bộ đánh dấu">Bỏ đánh dấu</button>
      <span class="sep"></span>
      <button id="secEncrypt" title="Đặt mật khẩu mở file + quyền hạn (AES-256)">🔑 Đặt mật khẩu</button>
      <button id="secDecrypt" title="Gỡ mật khẩu (cần mật khẩu hiện tại)">🔓 Gỡ mật khẩu</button>
      <button id="secStripMeta" title="Xoá /Info (tác giả, phần mềm tạo...) và XMP metadata khỏi file">🧹 Xoá metadata</button>
      <span class="sep"></span>
      <button id="secCreateId" title="Tạo Digital ID tự ký (RSA-2048) để ký thử">🪪 Tạo Digital ID</button>
      <button id="secSign" title="Ký số tài liệu bằng Digital ID">✍️ Ký số</button>
      <button id="secVerify" title="Kiểm tra tính hợp lệ của chữ ký trong file">🔎 Kiểm tra chữ ký</button>
      <button id="secOptimize" title="Nén object stream + dọn object rác (giảm dung lượng)">📦 Lưu tối ưu</button>
      <span class="spacer"></span>
      <span id="secHint" class="status"></span>
    </div>

    <div class="body">
      <aside id="sidebar" class="sidebar">
        <div class="tabs">
          <button id="tabThumbs" class="tab active">Thumbnails</button>
          <button id="tabOutline" class="tab">Outline</button>
          <button id="tabComments" class="tab">Chú thích</button>
        </div>
        <div id="thumbs" class="panel thumbs"></div>
        <div id="outline" class="panel outline hidden"></div>
        <div id="comments" class="panel comments hidden"></div>
      </aside>

      <main id="viewport" class="viewport">
        <div id="pages" class="pages"></div>
      </main>

      <main id="organizeGrid" class="organize-grid hidden"></main>

      <main id="editStage" class="edit-stage hidden">
        <div id="editPageWrap" class="edit-page-wrap">
          <img id="editImg" class="edit-img" alt="trang đang sửa"/>
          <div id="editOverlay" class="edit-overlay"></div>
        </div>
      </main>
    </div>

    <div id="modalOverlay" class="modal-overlay hidden">
      <div id="modalBox" class="modal-box"></div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
